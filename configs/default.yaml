# Earnings Intelligence Platform — Configuration
# All experiment parameters in one place for reproducibility

project:
  name: "earnings-intelligence-platform"
  version: "1.0.0"
  description: "Self-evaluating RAG over SEC filings and earnings transcripts"

# Data ingestion settings
ingestion:
  sec_edgar:
    user_agent: "EarningsIntel research@example.com"  # SEC requires identification
    base_url: "https://efts.sec.gov/LATEST/search-index"
    filing_types: ["10-K", "10-Q"]
    companies:
      - ticker: "AAPL"
        cik: "0000320193"
        name: "Apple Inc."
      - ticker: "MSFT"
        cik: "0000789019"
        name: "Microsoft Corporation"
      - ticker: "GOOGL"
        cik: "0001652044"
        name: "Alphabet Inc."
      - ticker: "NVDA"
        cik: "0001045810"
        name: "NVIDIA Corporation"
      - ticker: "META"
        cik: "0001326801"
        name: "Meta Platforms Inc."
    max_filings_per_company: 4  # Last 4 years
  sections_to_extract:
    - "risk_factors"           # Item 1A
    - "mda"                    # Item 7 — Management Discussion & Analysis
    - "business_overview"      # Item 1
    - "financial_statements"   # Item 8

# Chunking strategies to benchmark
chunking:
  strategies:
    fixed:
      chunk_size: 512
      chunk_overlap: 64
    sentence:
      min_sentences: 3
      max_sentences: 8
    semantic:
      embedding_model: "all-MiniLM-L6-v2"
      similarity_threshold: 0.75
      min_chunk_size: 100
      max_chunk_size: 1000
  metadata_fields:
    - "company"
    - "ticker"
    - "filing_type"
    - "filing_date"
    - "section"

# Retrieval configurations to benchmark
retrieval:
  embedding_model: "all-MiniLM-L6-v2"
  vectorstore: "chromadb"
  vectorstore_path: "data/vectorstore"
  strategies:
    dense:
      model: "all-MiniLM-L6-v2"
      top_k: 10
    sparse:
      algorithm: "bm25"
      top_k: 10
    hybrid:
      dense_weight: 0.6
      sparse_weight: 0.4
      top_k: 10
    hybrid_reranked:
      dense_weight: 0.6
      sparse_weight: 0.4
      top_k: 20  # Retrieve more, then rerank to top_k_final
      top_k_final: 10
      reranker_model: "cross-encoder/ms-marco-MiniLM-L6-v2"

# Generation settings
generation:
  model: "gpt-4o-mini"
  temperature: 0.1
  max_tokens: 1024
  system_prompt: |
    You are a financial analyst assistant. Answer questions about SEC filings
    and earnings call transcripts using ONLY the provided context. 
    Always cite the specific filing, section, and company when making claims.
    If the context doesn't contain enough information, say so explicitly.

# Risk signal extraction
risk_extraction:
  categories:
    - name: "litigation"
      keywords: ["lawsuit", "litigation", "legal proceedings", "settlement", "plaintiff", "defendant"]
    - name: "regulatory"
      keywords: ["regulation", "regulatory", "compliance", "SEC", "FTC", "antitrust", "consent decree"]
    - name: "supply_chain"
      keywords: ["supply chain", "supplier", "shortage", "logistics", "procurement", "inventory"]
    - name: "macroeconomic"
      keywords: ["inflation", "interest rate", "recession", "economic downturn", "currency", "tariff"]
    - name: "cybersecurity"
      keywords: ["cybersecurity", "data breach", "ransomware", "unauthorized access", "security incident"]
    - name: "competitive"
      keywords: ["competition", "market share", "competitive pressure", "pricing pressure", "disruption"]
  severity_model: "gpt-4o-mini"

# Evaluation settings
evaluation:
  ragas_metrics:
    - "faithfulness"
    - "answer_relevancy"
    - "context_precision"
    - "context_recall"
  eval_dataset_size: 50  # Number of Q&A pairs per config
  llm_judge:
    model: "gpt-4o-mini"
    temperature: 0.0

# MLflow experiment tracking
tracking:
  backend: "mlflow"
  experiment_name: "earnings-intelligence-rag"
  tracking_uri: "mlruns"
  log_artifacts: true
